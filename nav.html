<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0a0608"/>
<title>A Birthday Surprise</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0608;
  --border:rgba(212,175,102,0.18);
  --gold:#d4af66; --gold-lt:#f0d080;
  --rose:#c8566a; --cream:#f5ede0;
  --muted:#7a6a5a; --text:#e8ddd0;
  --fs-xs:clamp(.58rem,1.2vw,.65rem);
  --fs-sm:clamp(.72rem,1.5vw,.82rem);
  --fs-base:clamp(.85rem,1.8vw,.95rem);
  --fs-md:clamp(1rem,2.2vw,1.15rem);
  --fs-lg:clamp(1.4rem,3.5vw,2.4rem);
  --fs-xl:clamp(1.8rem,5vw,3.2rem);
  --sp-xs:clamp(6px,1.2vw,10px);
  --sp-sm:clamp(10px,2vw,16px);
  --sp-md:clamp(16px,3vw,24px);
  --sp-lg:clamp(24px,4vw,44px);
  --sp-xl:clamp(32px,5vw,56px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);
  font-family:'Jost',sans-serif;color:var(--text);
  -webkit-text-size-adjust:100%;}

/* grain */
body::before{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:150px;opacity:.4;}

/* ambient glow */
.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 15% 85%,rgba(200,86,106,.06) 0%,transparent 70%),
    radial-gradient(ellipse 50% 35% at 85% 15%,rgba(212,175,102,.05) 0%,transparent 70%);}

/* deco circles */
.deco-lines{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.deco-lines::before,.deco-lines::after{content:'';position:absolute;border-radius:50%;
  border:1px solid rgba(212,175,102,.04);}
.deco-lines::before{width:min(700px,140vw);height:min(700px,140vw);top:50%;left:50%;transform:translate(-50%,-50%);}
.deco-lines::after{width:min(1000px,200vw);height:min(1000px,200vw);top:50%;left:50%;transform:translate(-50%,-50%);}

/* main panel */
.panel{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:clamp(28px,5vw,48px);
  padding:var(--sp-lg);
  animation:fadeRise .9s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeRise{from{opacity:0;transform:translateY(32px);}to{opacity:1;transform:translateY(0);}}

.post-eyebrow{display:flex;align-items:center;gap:clamp(10px,2.5vw,18px);}
.post-eline{width:clamp(30px,8vw,70px);height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
.post-eline.r{background:linear-gradient(90deg,var(--gold),transparent);}
.post-etext{font-size:var(--fs-xs);letter-spacing:.35em;text-transform:uppercase;color:var(--gold);font-weight:200;}

.post-heading{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2rem,6vw,3.8rem);
  font-weight:300;color:var(--cream);
  text-align:center;line-height:1.1;
}
.post-heading em{font-style:italic;color:var(--gold-lt);}

.post-sub{
  font-size:var(--fs-sm);font-weight:200;
  letter-spacing:.08em;color:var(--muted);
  text-align:center;max-width:340px;line-height:1.8;
}

.post-divider{
  width:clamp(60px,15vw,100px);height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

.nav-buttons{
  display:flex;flex-wrap:wrap;
  gap:clamp(10px,2.5vw,16px);
  justify-content:center;
  width:100%;max-width:560px;
}

.nav-btn{
  flex:1 1 clamp(110px,22vw,150px);
  max-width:180px;
  padding:clamp(14px,2.5vw,18px) clamp(16px,3vw,24px);
  border:1px solid var(--border);border-radius:3px;
  background:rgba(255,255,255,.025);
  color:var(--cream);font-family:'Jost',sans-serif;
  font-size:var(--fs-xs);font-weight:400;
  letter-spacing:.25em;text-transform:uppercase;
  cursor:pointer;position:relative;overflow:hidden;
  transition:border-color .3s,background .3s,transform .15s,box-shadow .3s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.nav-btn::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(212,175,102,.12),transparent 60%);
  opacity:0;transition:opacity .3s;}
.nav-btn::after{content:'';position:absolute;bottom:0;left:0;right:0;
  height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
  transform:scaleX(0);transition:transform .4s ease;}
.nav-btn:hover{border-color:rgba(212,175,102,.5);background:rgba(212,175,102,.06);
  transform:translateY(-3px);box-shadow:0 8px 32px rgba(212,175,102,.15);}
.nav-btn:hover::before{opacity:1;}
.nav-btn:hover::after{transform:scaleX(1);}
.nav-btn:active{transform:translateY(-1px);}
.nav-btn-icon{display:block;font-size:clamp(1.3rem,3.5vw,1.8rem);margin-bottom:8px;}
.nav-btn-label{display:block;}

/* ══ MOBILE ══ */
@media(max-width:480px){
  .nav-buttons{gap:8px;}
  .nav-btn{flex:1 1 calc(50% - 8px);max-width:none;}
  .post-heading{font-size:clamp(1.6rem,7vw,2.4rem);}
  .panel{padding:clamp(16px,4vw,32px);}
}
@media(max-width:380px){
  .nav-buttons{gap:8px;}
  .nav-btn{max-width:100%;flex-basis:100%;}
}
/* ══ LARGE DESKTOP ══ */
@media(min-width:1200px){
  .post-heading{font-size:4rem;}
  .nav-btn{max-width:200px;}
}
@media(min-width:1920px){
  .nav-buttons{max-width:900px;gap:24px;}
  .nav-btn{max-width:260px;min-height:100px;}
}
@media(min-width:2560px){
  .panel{gap:80px;}
  .nav-buttons{max-width:1200px;gap:32px;}
  .nav-btn{max-width:340px;min-height:140px;border-radius:8px;}
  .post-sub{max-width:700px;font-size:1.2rem;}
}
@media(min-width:3840px){
  .panel{gap:120px;}
  .nav-buttons{max-width:1800px;gap:48px;}
  .nav-btn{max-width:480px;min-height:200px;border-radius:12px;}
  .post-sub{max-width:1000px;}
  .post-divider{width:300px;}
}
@media(max-height:500px) and (orientation:landscape){
  .panel{gap:16px;}
  .post-heading{font-size:1.8rem;}
  .nav-buttons{flex-direction:row;flex-wrap:nowrap;}
  .nav-btn{flex:1 1 auto;max-width:none;}
}
/* ══ HOVER only on non-touch ══ */
@media(hover:none){
  .nav-btn:hover{transform:none;box-shadow:none;border-color:var(--border);}
}
</style>

<style>
/* ══════════════════════════════════════════════════════
   UNIVERSAL RESPONSIVE — 5in phone → 45in TV
   320px  → small phones
   375px  → iPhone SE / standard phones
   480px  → large phones
   600px  → small tablets / foldables
   768px  → tablets portrait
   1024px → tablets landscape / small laptops
   1280px → laptops
   1440px → large laptops / monitors
   1920px → Full HD / large monitors
   2560px → 2K / 27in monitors
   3840px → 4K TVs
   5120px → 45in+ large TVs
══════════════════════════════════════════════════════ */

/* ── 5in small phones (320–374px) ── */
@media(max-width:374px){
  :root{
    --fs-xs:.55rem;--fs-sm:.68rem;--fs-base:.78rem;
    --fs-md:.9rem;--fs-lg:1.3rem;--fs-xl:1.6rem;
    --sp-xs:4px;--sp-sm:8px;--sp-md:12px;--sp-lg:18px;--sp-xl:24px;
  }
  .back-btn{padding:7px 11px;font-size:.52rem;}
  .page{padding-top:60px !important;}
}

/* ── Standard phones (375–479px) ── */
@media(min-width:375px) and (max-width:479px){
  :root{
    --fs-xs:.58rem;--fs-sm:.72rem;--fs-base:.82rem;
    --fs-md:.95rem;--fs-lg:1.4rem;--fs-xl:1.8rem;
  }
}

/* ── Large phones (480–599px) ── */
@media(min-width:480px) and (max-width:599px){
  :root{
    --fs-xs:.6rem;--fs-sm:.75rem;--fs-base:.85rem;
    --fs-md:1rem;--fs-lg:1.5rem;--fs-xl:2rem;
  }
}

/* ── Tablets portrait / foldables (600–767px) ── */
@media(min-width:600px) and (max-width:767px){
  :root{
    --fs-xs:.62rem;--fs-sm:.78rem;--fs-base:.9rem;
    --fs-md:1.05rem;--fs-lg:1.7rem;--fs-xl:2.2rem;
  }
}

/* ── Tablets landscape (768–1023px) ── */
@media(min-width:768px) and (max-width:1023px){
  :root{
    --fs-xs:.65rem;--fs-sm:.82rem;--fs-base:.95rem;
    --fs-md:1.1rem;--fs-lg:1.9rem;--fs-xl:2.6rem;
  }
}

/* ── Small laptops (1024–1279px) ── */
@media(min-width:1024px) and (max-width:1279px){
  :root{
    --fs-xs:.66rem;--fs-sm:.84rem;--fs-base:.97rem;
    --fs-md:1.12rem;--fs-lg:2rem;--fs-xl:2.8rem;
  }
}

/* ── Laptops / monitors (1280–1439px) ── */
@media(min-width:1280px) and (max-width:1439px){
  :root{
    --fs-xs:.68rem;--fs-sm:.86rem;--fs-base:1rem;
    --fs-md:1.15rem;--fs-lg:2.2rem;--fs-xl:3rem;
  }
}

/* ── Large monitors (1440–1919px) ── */
@media(min-width:1440px) and (max-width:1919px){
  :root{
    --fs-xs:.72rem;--fs-sm:.9rem;--fs-base:1.05rem;
    --fs-md:1.2rem;--fs-lg:2.4rem;--fs-xl:3.2rem;
    --sp-lg:48px;--sp-xl:64px;
  }
}

/* ── Full HD monitors (1920–2559px) ── */
@media(min-width:1920px) and (max-width:2559px){
  :root{
    --fs-xs:.78rem;--fs-sm:.98rem;--fs-base:1.12rem;
    --fs-md:1.3rem;--fs-lg:2.8rem;--fs-xl:3.8rem;
    --sp-lg:56px;--sp-xl:72px;
  }
  .back-btn{padding:12px 24px;font-size:.75rem;}
}

/* ── 2K monitors (2560–3839px) ── */
@media(min-width:2560px) and (max-width:3839px){
  :root{
    --fs-xs:1rem;--fs-sm:1.2rem;--fs-base:1.4rem;
    --fs-md:1.65rem;--fs-lg:3.5rem;--fs-xl:5rem;
    --sp-xs:12px;--sp-sm:20px;--sp-md:32px;--sp-lg:64px;--sp-xl:90px;
  }
  .back-btn{padding:16px 32px;font-size:1rem;border-radius:999px;}
  .nav-btn{padding:24px 32px !important;font-size:.95rem !important;}
}

/* ── 4K TVs (3840–5119px) ── */
@media(min-width:3840px) and (max-width:5119px){
  :root{
    --fs-xs:1.4rem;--fs-sm:1.7rem;--fs-base:1.9rem;
    --fs-md:2.2rem;--fs-lg:4.8rem;--fs-xl:7rem;
    --sp-xs:18px;--sp-sm:28px;--sp-md:48px;--sp-lg:90px;--sp-xl:130px;
  }
  .back-btn{padding:22px 44px;font-size:1.4rem;border-radius:999px;}
  .nav-btn{padding:36px 48px !important;font-size:1.3rem !important;max-width:320px !important;}
  .nav-btn-icon{font-size:3rem !important;}
}

/* ── 45in+ large TVs (5120px+) ── */
@media(min-width:5120px){
  :root{
    --fs-xs:1.8rem;--fs-sm:2.2rem;--fs-base:2.5rem;
    --fs-md:2.8rem;--fs-lg:6rem;--fs-xl:9rem;
    --sp-xs:24px;--sp-sm:36px;--sp-md:60px;--sp-lg:120px;--sp-xl:170px;
  }
  .back-btn{padding:28px 56px;font-size:1.8rem;border-radius:999px;}
  .nav-btn{padding:48px 64px !important;font-size:1.7rem !important;max-width:420px !important;}
  .nav-btn-icon{font-size:4rem !important;}
}

/* ── Landscape phones ── */
@media(max-height:500px) and (orientation:landscape){
  .page{padding-top:50px !important;padding-bottom:20px !important;}
  .header{gap:6px !important;}
}

</style>
</head>
<body>
<div class="ambient"></div>
<div class="deco-lines"></div>

<div class="panel">
  <div class="post-eyebrow">
    <div class="post-eline"></div>
    <span class="post-etext">A Night to Remember</span>
    <div class="post-eline r"></div>
  </div>
  <div class="post-divider"></div>
  <div class="post-heading">Happy Birthday,<br/><em>Reshma</em> 🎂✨</div>
  <p class="post-sub">The night sky is yours tonight. Where would you like to go next?</p>
  <div class="post-divider"></div>
  <div class="nav-buttons">
    <button class="nav-btn" onclick="window.location.href='night-sky.html'">
      <span class="nav-btn-icon">🌌</span>
      <span class="nav-btn-label">Night Sky</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='memories.html'">
      <span class="nav-btn-icon">📸</span>
      <span class="nav-btn-label">Memories</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='timeline.html'">
      <span class="nav-btn-icon">⏳</span>
      <span class="nav-btn-label">Timeline</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='scratch.html'">
      <span class="nav-btn-icon">💌</span>
      <span class="nav-btn-label">A Letter</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='promise-jar.html'">
      <span class="nav-btn-icon">🫙</span>
      <span class="nav-btn-label">Promises</span>
    </button>
  </div>
</div>
</body>
</html>
